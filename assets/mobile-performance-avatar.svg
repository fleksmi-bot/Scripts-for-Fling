<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Mobile Performance Overlay Avatar</title>
  <desc id="desc">A neon-styled Roblox-inspired avatar icon with performance bars.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="48%" r="56%">
      <stop offset="0%" stop-color="#183049"/>
      <stop offset="68%" stop-color="#101827"/>
      <stop offset="100%" stop-color="#07111d"/>
    </radialGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0077ff"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="128" cy="128" r="116" fill="url(#cyan)" opacity="0.92"/>
  <circle cx="128" cy="128" r="98" fill="#0b1220"/>
  <circle cx="128" cy="128" r="92" fill="url(#bgGlow)" stroke="#00c8ff" stroke-width="3" opacity="0.96"/>

  <g filter="url(#softGlow)">
    <rect x="82" y="70" width="92" height="88" rx="18" fill="#2c3446"/>
    <rect x="94" y="83" width="70" height="64" rx="12" fill="#414a5f"/>
    <path d="M84 96c0-20 16-38 39-38h24c16 0 27 10 27 25v28h-29V94H84z" fill="#161b29"/>
    <rect x="76" y="88" width="23" height="40" rx="8" fill="#161b29"/>
    <rect x="101" y="111" width="18" height="10" rx="4" fill="#20d8ff"/>
    <rect x="137" y="111" width="18" height="10" rx="4" fill="#20d8ff"/>
    <rect x="113" y="135" width="32" height="6" rx="3" fill="#f2fbff" opacity="0.9"/>
  </g>

  <g>
    <rect x="58" y="155" width="140" height="52" rx="23" fill="#202a3f"/>
    <rect x="74" y="166" width="108" height="34" rx="14" fill="#334058"/>
    <rect x="70" y="176" width="10" height="22" rx="5" fill="#46ffaa"/>
    <rect x="87" y="164" width="10" height="34" rx="5" fill="#00b4ff"/>
    <rect x="104" y="172" width="10" height="26" rx="5" fill="#ffea5a"/>
    <rect x="126" y="177" width="56" height="15" rx="7.5" fill="#00b4ff" opacity="0.9"/>
    <rect x="134" y="182" width="40" height="5" rx="2.5" fill="#f1fbff" opacity="0.86"/>
  </g>
</svg>
